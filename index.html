<script>
    const githubUser = "szarate88"; 
    const csvSourceActivities = `https://raw.githubusercontent.com/${githubUser}/redctsperu-dashboard/main/data/activities.csv`;
    const csvSourceNotifications = `https://raw.githubusercontent.com/${githubUser}/redctsperu-dashboard/main/data/notificaciones.csv`;

    let globalNotificationsCache = {};

    // 1. PROCESADOR SANITIZADO DE NOTIFICACIONES (ORDEN CRONOLÓGICO DE ARRIBA A ABAJO)
    Papa.parse(csvSourceNotifications, {
        download: true,
        header: true,
        skipEmptyLines: true,
        relaxed: true,
        complete: function(results) {
            const data = results.data;
            const dropdown = document.getElementById("weekDropdown");
            let optionsHTML = "";

            // Filtramos únicamente filas con datos válidos
            const validRows = data.filter(row => row.Semana && row.Titulo && row.Acuerdos);

            // Al estar el CSV ordenado con w14 (13 de Julio) arriba del todo, iteramos directamente en orden natural
            validRows.forEach((row) => {
                const id = row.Semana.trim();
                const title = row.Titulo.trim();
                const agreements = row.Acuerdos.trim();

                globalNotificationsCache[id] = {
                    title: title,
                    items: agreements.split(';').map(item => item.trim()).filter(item => item !== "")
                };
                optionsHTML += `<option value="${id}">${title}</option>`;
            });

            dropdown.innerHTML = optionsHTML;
            renderSelectedSummary();
        },
        error: function() {
            Papa.parse("data/notificaciones.csv", {
                download: true, header: true, skipEmptyLines: true, relaxed: true,
                complete: function(results) {
                    const data = results.data;
                    const dropdown = document.getElementById("weekDropdown");
                    let optionsHTML = "";
                    const validRows = data.filter(row => row.Semana && row.Titulo && row.Acuerdos);
                    validRows.forEach(row => {
                        const id = row.Semana.trim();
                        globalNotificationsCache[id] = {
                            title: row.Titulo.trim(),
                            items: row.Acuerdos.split(';').map(item => item.trim()).filter(item => item !== "")
                        };
                        optionsHTML += `<option value="${id}">${row.Titulo.trim()}</option>`;
                    });
                    dropdown.innerHTML = optionsHTML;
                    renderSelectedSummary();
                }
            });
        }
    });

    function renderSelectedSummary() {
        const selectedId = document.getElementById("weekDropdown").value;
        const data = globalNotificationsCache[selectedId];
        
        if (!data) {
            document.getElementById("summary-content-box").innerHTML = "<p style='color: var(--text-muted);'>No hay información disponible.</p>";
            return;
        }

        let html = `<h3>${data.title}</h3><ul>`;
        data.items.forEach(item => {
            html += `<li>${item}</li>`;
        });
        html += `</ul>`;
        
        document.getElementById("summary-content-box").innerHTML = html;
    }

    function downloadSummaryPDF() {
        window.print();
    }

    // 2. RENDERIZADOR DEL CRONOGRAMA DE ACTIVIDADES (3 COLUMNAS)
    function generateCleanTableHTML(data) {
        if (!data || data.length === 0) return '<p style="color: var(--text-muted);">Sin registros en el cronograma.</p>';

        const targetHeaders = ["Fecha", "Tarea Crítica", "Estado"];
        let tableHtml = '<table><thead><tr>';
        targetHeaders.forEach(header => tableHtml += `<th>${header}</th>`);
        tableHtml += '</tr></thead><tbody id="table-rows-target">';

        data.forEach(row => {
            let dateVal = row["Fecha"] || row["Mes"] || '';
            let taskVal = row["Tarea Crítica"] || row["Tarea Crítica a Monitorear"] || '';
            let stateVal = row["Estado"] || row["Estado ( )"] || 'Pendiente';

            if (dateVal || taskVal) {
                tableHtml += '<tr>';
                tableHtml += `<td><strong>${dateVal}</strong></td>`;
                tableHtml += `<td>${taskVal}</td>`;
                
                let stateClass = "status-pendiente";
                let lowerState = stateVal.toLowerCase();
                if (lowerState === 'completo' || lowerState === 'completado') stateClass = "status-completo";
                if (lowerState === 'en proceso' || lowerState === 'en progreso') stateClass = "status-proceso";
                
                tableHtml += `<td><span class="badge ${stateClass}">${stateVal}</span></td>`;
                tableHtml += '</tr>';
            }
        });
        
        tableHtml += '</tbody></table>';
        return tableHtml;
    }

    function filterActivitiesTable() {
        let val = document.getElementById("globalSearch").value.toLowerCase();
        let rows = document.querySelectorAll("#table-rows-target tr");
        rows.forEach(r => r.style.display = r.textContent.toLowerCase().includes(val) ? "" : "none");
    }

    Papa.parse(csvSourceActivities, {
        download: true, header: true, skipEmptyLines: true,
        complete: function(r) { 
            document.getElementById('activities-table-container').innerHTML = generateCleanTableHTML(r.data); 
        },
        error: function() {
            Papa.parse("data/activities.csv", {
                download: true, header: true, skipEmptyLines: true,
                complete: function(r) { 
                    document.getElementById('activities-table-container').innerHTML = generateCleanTableHTML(r.data); 
                }
            });
        }
    });
</script>
